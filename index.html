<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Novel | Dashboard Contable</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<!-- Exportación -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root{
  --azul: #153365;
  --azul-800: #0f2549;
  --azul-100: #e7ecf5;
  --azul-050: #f3f6fb;
  --gris: #888888;
  --gris-200: #e2e4e8;
  --gris-100: #f4f5f7;
  --gris-050: #fafafb;
  --blanco: #ffffff;
  --texto: #1c2430;
  --texto-suave: #5b6270;
  --exito: #1c7c4c;
  --exito-bg: #e7f6ee;
  --alerta: #b45309;
  --alerta-bg: #fdf1e2;
  --error: #b91c1c;
  --error-bg: #fbe9e9;
  --radio: 10px;
  --sombra: 0 1px 2px rgba(21,51,101,.06), 0 4px 16px rgba(21,51,101,.06);
  --font: Avenir, "Avenir Next", "Segoe UI", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family: var(--font);
  background: var(--gris-050);
  color: var(--texto);
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea{ font-family: var(--font); }
button{ cursor:pointer; }
a{ color: var(--azul); }
::selection{ background: var(--azul-100); }

/* ---------- Layout general ---------- */
#app{ min-height:100vh; }
.hidden{ display:none !important; }

/* ---------- Login ---------- */
.login-wrap{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(160deg, var(--azul) 0%, var(--azul-800) 55%, #0a1a33 100%);
  padding:24px;
}
.login-card{
  width:100%; max-width:400px; background:var(--blanco); border-radius:16px;
  padding:40px 36px 32px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
}
.login-brand{ text-align:center; margin-bottom:28px; }
.login-brand .mark{
  width:56px; height:56px; border-radius:14px; background:var(--azul); color:#fff;
  display:flex; align-items:center; justify-content:center; font-weight:700; font-size:22px;
  margin:0 auto 14px; letter-spacing:.5px;
}
.login-brand h1{ font-size:22px; margin:0 0 4px; color:var(--azul); letter-spacing:.2px; }
.login-brand p{ margin:0; font-size:12.5px; color:var(--texto-suave); line-height:1.5; }
.field{ margin-bottom:16px; }
.field label{ display:block; font-size:12.5px; font-weight:600; color:var(--texto-suave); margin-bottom:6px; }
.field input, .field select, .field textarea{
  width:100%; padding:11px 13px; border:1.5px solid var(--gris-200); border-radius:9px;
  font-size:14.5px; color:var(--texto); background:#fff; transition:border-color .15s;
}
.field input:focus, .field select:focus, .field textarea:focus{ outline:none; border-color:var(--azul); }
.field input:disabled{ background:var(--gris-100); color:var(--texto-suave); }
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:11px 18px; border-radius:9px; border:none; font-size:14px; font-weight:600;
  transition:filter .15s, transform .05s;
}
.btn:active{ transform: translateY(1px); }
.btn-primary{ background:var(--azul); color:#fff; width:100%; }
.btn-primary:hover{ filter:brightness(1.12); }
.btn-secondary{ background:var(--gris-100); color:var(--texto); border:1.5px solid var(--gris-200); }
.btn-secondary:hover{ background:var(--gris-200); }
.btn-danger{ background:var(--error-bg); color:var(--error); border:1.5px solid #f3caca; }
.btn-danger:hover{ filter:brightness(.97); }
.btn-ghost{ background:transparent; color:var(--texto-suave); }
.btn-ghost:hover{ background:var(--gris-100); }
.btn-sm{ padding:7px 12px; font-size:12.5px; border-radius:7px; }
.btn:disabled{ opacity:.55; cursor:not-allowed; }
.login-error{
  background:var(--error-bg); color:var(--error); font-size:13px; padding:10px 12px;
  border-radius:8px; margin-bottom:16px; display:none;
}
.login-foot{ text-align:center; margin-top:16px; }
.login-foot a{ font-size:12.5px; color:var(--texto-suave); text-decoration:none; }
.login-foot a:hover{ color:var(--azul); text-decoration:underline; }

/* ---------- Shell ---------- */
.shell{ display:flex; min-height:100vh; }
.sidebar{
  width:236px; flex-shrink:0; background:var(--azul); color:#fff;
  display:flex; flex-direction:column; padding:22px 16px;
  position:fixed; top:0; left:0; bottom:0;
}
.sidebar .brand{ display:flex; align-items:center; gap:10px; padding:0 6px 22px; border-bottom:1px solid rgba(255,255,255,.14); margin-bottom:18px;}
.sidebar .brand .mark{ width:34px; height:34px; border-radius:9px; background:rgba(255,255,255,.14); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:15px; }
.sidebar .brand .txt strong{ display:block; font-size:14.5px; line-height:1.2; }
.sidebar .brand .txt span{ display:block; font-size:10px; color:rgba(255,255,255,.65); line-height:1.3; margin-top:2px; }
.nav-item{
  display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px;
  color:rgba(255,255,255,.8); font-size:13.5px; font-weight:500; margin-bottom:2px; cursor:pointer;
  border:none; background:transparent; width:100%; text-align:left;
}
.nav-item:hover{ background:rgba(255,255,255,.08); color:#fff; }
.nav-item.active{ background:rgba(255,255,255,.16); color:#fff; }
.nav-item .ico{ width:18px; text-align:center; font-size:14px; }
.sidebar-foot{ margin-top:auto; padding-top:14px; border-top:1px solid rgba(255,255,255,.14); }
.user-chip{ display:flex; align-items:center; gap:10px; padding:8px 6px; }
.user-chip .av{ width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,.16); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0; }
.user-chip .meta strong{ display:block; font-size:12.5px; }
.user-chip .meta span{ display:block; font-size:10.5px; color:rgba(255,255,255,.6); }

.main{ margin-left:236px; flex:1; display:flex; flex-direction:column; min-width:0; }
.topbar{
  background:#fff; border-bottom:1px solid var(--gris-200); padding:16px 28px;
  display:flex; align-items:center; justify-content:space-between; gap:16px; position:sticky; top:0; z-index:20;
}
.topbar h2{ margin:0; font-size:18px; color:var(--azul); }
.topbar .sub{ font-size:12.5px; color:var(--texto-suave); margin-top:2px; }
.content{ padding:24px 28px 60px; flex:1; }

.searchbar{ position:relative; max-width:320px; flex:1; }
.searchbar input{
  width:100%; padding:10px 14px 10px 34px; border-radius:9px; border:1.5px solid var(--gris-200);
  font-size:13.5px; background:var(--gris-050);
}
.searchbar input:focus{ outline:none; border-color:var(--azul); background:#fff; }
.searchbar .ico{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--gris); font-size:13px; }

/* ---------- Tabla clientes ---------- */
.card{ background:#fff; border-radius:var(--radio); border:1px solid var(--gris-200); box-shadow: var(--sombra); }
.toolbar{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
table{ width:100%; border-collapse:collapse; font-size:13.5px; }
th{ text-align:left; padding:12px 16px; font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--texto-suave); border-bottom:1.5px solid var(--gris-200); font-weight:700; }
td{ padding:13px 16px; border-bottom:1px solid var(--gris-100); vertical-align:middle; }
tr:last-child td{ border-bottom:none; }
tr.row-click{ cursor:pointer; }
tr.row-click:hover td{ background:var(--azul-050); }
.badge{ display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700; }
.badge-ok{ background:var(--exito-bg); color:var(--exito); }
.badge-off{ background:var(--gris-100); color:var(--texto-suave); }
.badge-role{ background:var(--azul-100); color:var(--azul); }
.empty{ padding:50px 20px; text-align:center; color:var(--texto-suave); }
.empty .ico{ font-size:30px; margin-bottom:10px; opacity:.5; }
.icon-btn{ border:none; background:transparent; padding:6px; border-radius:6px; color:var(--texto-suave); font-size:14px; }
.icon-btn:hover{ background:var(--gris-100); color:var(--azul); }
.row-actions{ display:flex; gap:2px; justify-content:flex-end; }

/* ---------- Modal / panel detalle ---------- */
.overlay{
  position:fixed; inset:0; background:rgba(15,25,45,.45); display:flex; justify-content:flex-end;
  z-index:100; animation:fadeIn .15s ease;
}
@keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
.panel{
  width:min(760px, 100vw); background:#fff; height:100vh; overflow-y:auto;
  box-shadow:-8px 0 30px rgba(0,0,0,.15); animation:slideIn .2s ease;
}
@keyframes slideIn{ from{ transform:translateX(24px); opacity:0;} to{ transform:translateX(0); opacity:1;} }
.panel-head{ padding:22px 28px; border-bottom:1px solid var(--gris-200); display:flex; align-items:flex-start; justify-content:space-between; position:sticky; top:0; background:#fff; z-index:5; }
.panel-head h2{ margin:0 0 4px; font-size:19px; color:var(--azul); }
.panel-head .rut{ font-size:12.5px; color:var(--texto-suave); }
.panel-close{ border:none; background:var(--gris-100); width:32px; height:32px; border-radius:50%; font-size:15px; color:var(--texto-suave); flex-shrink:0; }
.panel-close:hover{ background:var(--gris-200); color:var(--texto); }
.tabs{ display:flex; gap:4px; padding:0 28px; border-bottom:1px solid var(--gris-200); background:#fff; position:sticky; top:78px; z-index:5; }
.tab-btn{ border:none; background:transparent; padding:12px 6px; margin-right:20px; font-size:13.5px; font-weight:600; color:var(--texto-suave); border-bottom:2.5px solid transparent; }
.tab-btn.active{ color:var(--azul); border-bottom-color:var(--azul); }
.panel-body{ padding:24px 28px 60px; }

.grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px 18px; }
.section-title{ font-size:12px; text-transform:uppercase; letter-spacing:.5px; color:var(--gris); font-weight:700; margin: 22px 0 12px; display:flex; align-items:center; gap:8px; }
.section-title:first-child{ margin-top:0; }
.lock-note{ font-size:11px; font-weight:500; text-transform:none; letter-spacing:0; color:var(--texto-suave); background:var(--gris-100); padding:2px 8px; border-radius:10px; }
.form-actions{ display:flex; gap:10px; margin-top:24px; padding-top:18px; border-top:1px solid var(--gris-200); }

/* botonera archivos */
.botonera{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:22px; }
.boton-carga{
  background:var(--azul-050); border:1.5px dashed #c3d1e8; border-radius:10px; padding:16px 10px;
  text-align:center; color:var(--azul); font-size:12.5px; font-weight:700; display:flex; flex-direction:column; align-items:center; gap:8px;
}
.boton-carga:hover{ background:var(--azul-100); border-color:var(--azul); }
.boton-carga .ico{ font-size:20px; }
.boton-carga input{ display:none; }

.file-group{ margin-bottom:18px; }
.file-group h4{ font-size:13px; margin:0 0 8px; color:var(--texto); display:flex; align-items:center; gap:8px; }
.file-group h4 .count{ font-weight:400; color:var(--texto-suave); font-size:11.5px; }
.file-row{ display:flex; align-items:center; gap:10px; padding:9px 12px; border:1px solid var(--gris-200); border-radius:8px; margin-bottom:6px; font-size:13px; background:#fff; }
.file-row .fi{ color:var(--azul); font-size:15px; }
.file-row .fname{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.file-row .fmeta{ font-size:11px; color:var(--texto-suave); flex-shrink:0; }
.file-row-empty{ font-size:12.5px; color:var(--texto-suave); padding:8px 2px; }

/* indicadores */
.ind-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:20px; }
.ind-card{ background:var(--gris-050); border:1px solid var(--gris-200); border-radius:10px; padding:16px; cursor:pointer; transition:border-color .15s, transform .1s; }
.ind-card:hover{ border-color:var(--azul); transform:translateY(-1px); }
.ind-card .lbl{ font-size:11.5px; color:var(--texto-suave); font-weight:600; text-transform:uppercase; letter-spacing:.3px; margin-bottom:6px; }
.ind-card .val{ font-size:22px; font-weight:700; color:var(--azul); }
.ind-card .val small{ font-size:12px; font-weight:600; color:var(--gris); margin-left:4px; }
.ind-card .val.nd{ color:var(--gris); font-size:15px; font-weight:600; }
.ind-detail{ background:#fff; border:1px solid var(--gris-200); border-radius:10px; padding:16px 18px; margin-top:-4px; margin-bottom:20px; }
.ind-detail .formula{ font-size:12.5px; color:var(--texto-suave); margin-bottom:10px; font-family: 'Courier New', monospace; }
.ind-detail table{ font-size:12.5px; }
.ind-detail th, .ind-detail td{ padding:7px 10px; }
.periodo-select{ display:flex; align-items:center; gap:10px; margin-bottom:16px; }

/* mapeo cuentas */
.map-table td{ padding:6px 10px; }
.map-table select{ padding:6px 8px; font-size:12.5px; border-radius:6px; border:1.5px solid var(--gris-200); }

/* toast */
#toast{
  position:fixed; bottom:24px; right:24px; z-index:300; display:flex; flex-direction:column; gap:8px;
}
.toast-item{
  background:var(--azul-800); color:#fff; padding:12px 18px; border-radius:9px; font-size:13px;
  box-shadow:0 8px 24px rgba(0,0,0,.25); min-width:220px; animation:toastIn .2s ease;
}
.toast-item.err{ background:var(--error); }
.toast-item.ok{ background:var(--exito); }
@keyframes toastIn{ from{ transform:translateY(8px); opacity:0;} to{ transform:translateY(0); opacity:1;} }

/* confirm dialog */
.confirm-overlay{ position:fixed; inset:0; background:rgba(15,25,45,.5); display:flex; align-items:center; justify-content:center; z-index:400; }
.confirm-box{ background:#fff; border-radius:12px; padding:24px; width:340px; box-shadow:0 20px 50px rgba(0,0,0,.3); }
.confirm-box p{ font-size:13.5px; color:var(--texto); line-height:1.5; margin: 0 0 18px; }
.confirm-box .row{ display:flex; gap:10px; justify-content:flex-end; }

/* misc */
.spin{ width:16px; height:16px; border:2px solid rgba(255,255,255,.35); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; display:inline-block; }
@keyframes sp{ to{ transform:rotate(360deg); } }
.loading-full{ min-height:100vh; display:flex; align-items:center; justify-content:center; color:var(--gris); font-size:13.5px; }
.loading-full .spin{ border-color: var(--gris-200); border-top-color: var(--azul); width:28px; height:28px; margin-bottom:10px; }
.center-col{ display:flex; flex-direction:column; align-items:center; }
.two-cols-actions{ display:flex; gap:8px; flex-wrap:wrap; }
.pill-row{ display:flex; gap:8px; margin-bottom:16px; }
.pill{ padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; border:1.5px solid var(--gris-200); background:#fff; color:var(--texto-suave); }
.pill.active{ background:var(--azul); border-color:var(--azul); color:#fff; }
@media (max-width: 880px){
  .sidebar{ display:none; }
  .main{ margin-left:0; }
  .grid2, .botonera, .ind-grid{ grid-template-columns:1fr; }
}
</style>
</head>

<script>
/* ============================================================
   NOVEL · DASHBOARD CONTABLE
   Consultoría & Capacitación Financiera & Tributaria
   ============================================================ */

/* ---------------- Firebase init ---------------- */
const firebaseConfig = {
  apiKey: "AIzaSyDBlNoT-gzIfFvIbn-rc6VhdmuxEL9B5yM",
  authDomain: "dashboard-contable-b96fc.firebaseapp.com",
  projectId: "dashboard-contable-b96fc",
  storageBucket: "dashboard-contable-b96fc.firebasestorage.app",
  messagingSenderId: "496815444325",
  appId: "1:496815444325:web:b33f0a77becd9abc80118c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

/* Instancia secundaria: permite que un Admin cree cuentas de Contador
   sin perder su propia sesión activa. */
const secondaryApp = firebase.initializeApp(firebaseConfig, "Secondary");
const secondaryAuth = secondaryApp.auth();

/* ---------------- Estado global ---------------- */
const state = {
  user: null,            // { uid, nombre, email, rol }
  clientes: [],
  usuarios: [],
  vista: 'clientes',      // clientes | papelera | usuarios
  filtro: '',
  clienteActivoId: null,
  tabDetalle: 'ficha',    // ficha | archivos | indicadores
  indicadorAbierto: null,
  periodoIndicador: null,
  unsubClientes: null,
  unsubUsuarios: null,
  clienteCache: {},       // id -> { archivos:[], periodos:[] , unsub fns }
  papeleraTab: 'clientes'
};

const CATEGORIAS_ARCHIVO = [
  { key: 'balance', label: 'Balance', icon: '📊' },
  { key: 'eerr', label: 'EE.RR.', icon: '📈' },
  { key: 'remuneraciones', label: 'Libro Remuneraciones', icon: '📒' },
  { key: 'liquidaciones', label: 'Liquidaciones', icon: '🧾' }
];

const CATEGORIAS_CUENTA = [
  { key: '', label: '— Sin clasificar —' },
  { key: 'activo_circulante', label: 'Activo Circulante' },
  { key: 'existencias', label: 'Existencias' },
  { key: 'activo_fijo', label: 'Activo Fijo / Otros Activos' },
  { key: 'pasivo_circulante', label: 'Pasivo Circulante' },
  { key: 'pasivo_otro', label: 'Pasivo Largo Plazo / Otros Pasivos' },
  { key: 'total_activo', label: 'Total Activos (directo)' },
  { key: 'total_pasivo', label: 'Total Pasivos (directo)' },
  { key: 'patrimonio', label: 'Patrimonio' },
  { key: 'ventas', label: 'Ventas' },
  { key: 'ingresos_otros', label: 'Otros Ingresos' },
  { key: 'gastos', label: 'Gastos / Costos' },
  { key: 'utilidad', label: 'Utilidad del Ejercicio (directo)' },
  { key: 'ignorar', label: 'Ignorar' }
];

/* ---------------- Utilidades ---------------- */
function toast(msg, type){
  const el = document.createElement('div');
  el.className = 'toast-item' + (type ? ' ' + type : '');
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>{ el.remove(); }, 3600);
}

function fmtMoney(n){
  if(n === null || n === undefined || isNaN(n)) return 'N/D';
  return '$ ' + Math.round(n).toLocaleString('es-CL');
}
function fmtVeces(n){
  if(n === null || n === undefined || isNaN(n) || !isFinite(n)) return null;
  return n.toFixed(2).replace('.', ',') + ' veces';
}
function fmtPct(n){
  if(n === null || n === undefined || isNaN(n) || !isFinite(n)) return null;
  return (n*100).toFixed(1).replace('.', ',') + ' %';
}
function fmtFecha(ts){
  if(!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-CL') + ' ' + d.toLocaleTimeString('es-CL', {hour:'2-digit', minute:'2-digit'});
}
function esc(s){
  return (s===undefined||s===null) ? '' : String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function initials(nombre){
  if(!nombre) return '?';
  return nombre.trim().split(/\s+/).slice(0,2).map(p=>p[0]).join('').toUpperCase();
}

/* --- Formato / validación de RUT chileno --- */
function limpiarRut(rut){
  return (rut || '').replace(/[^0-9kK]/g, '').toUpperCase();
}
function formatearRut(valor){
  let limpio = limpiarRut(valor);
  if(limpio.length === 0) return '';
  let dv = limpio.slice(-1);
  let cuerpo = limpio.slice(0, -1);
  if(cuerpo.length === 0) return dv;
  cuerpo = cuerpo.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return cuerpo + '-' + dv;
}
function calcularDV(cuerpo){
  let suma = 0, mult = 2;
  for(let i = cuerpo.length - 1; i >= 0; i--){
    suma += parseInt(cuerpo[i], 10) * mult;
    mult = mult === 7 ? 2 : mult + 1;
  }
  const resto = 11 - (suma % 11);
  if(resto === 11) return '0';
  if(resto === 10) return 'K';
  return String(resto);
}
function rutValido(rut){
  const limpio = limpiarRut(rut);
  if(limpio.length < 2) return false;
  const cuerpo = limpio.slice(0, -1);
  const dv = limpio.slice(-1);
  if(!/^\d+$/.test(cuerpo)) return false;
  return calcularDV(cuerpo) === dv;
}

/* --- Clasificación heurística de cuentas contables --- */
function sugerirCategoria(nombreCuenta){
  const n = (nombreCuenta || '').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  if(n.includes('total activo circulante') || (n.includes('activo circulante') && !n.includes('total activo')))
    return 'activo_circulante';
  if(n.includes('existencia') || n.includes('inventario')) return 'existencias';
  if(n.includes('total pasivo circulante') || (n.includes('pasivo circulante')))
    return 'pasivo_circulante';
  if(n.includes('total activo') || n === 'total activos') return 'total_activo';
  if(n.includes('total pasivo') && n.includes('patrimonio')) return '';
  if(n.includes('total pasivo')) return 'total_pasivo';
  if(n.includes('patrimonio')) return 'patrimonio';
  if(n.includes('venta') || n.includes('ingresos de explotacion') || n.includes('ingresos por venta')) return 'ventas';
  if(n.includes('utilidad del ejercicio') || n.includes('resultado del ejercicio') || n.includes('perdida del ejercicio')) return 'utilidad';
  return '';
}

function bindLogin(){
  const doLogin = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const errBox = document.getElementById('loginError');
    errBox.style.display = 'none';
    if(!email || !pass){
      errBox.textContent = 'Ingresa tu correo y contraseña.';
      errBox.style.display = 'block';
      return;
    }
    const btn = document.getElementById('btnLogin');
    btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Ingresando…';
    try{
      await auth.signInWithEmailAndPassword(email, pass);
    }catch(e){
      errBox.textContent = traducirErrorAuth(e);
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar';
    }
  };
  document.getElementById('btnLogin').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('loginEmail').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  document.getElementById('linkReset').addEventListener('click', async (e)=>{
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    if(!email){ toast('Escribe tu correo primero.', 'err'); return; }
    try{
      await auth.sendPasswordResetEmail(email);
      toast('Enviamos un correo para restablecer tu contraseña.', 'ok');
    }catch(e){
      toast(traducirErrorAuth(e), 'err');
    }
  });
}
function traducirErrorAuth(e){
  const map = {
    'auth/invalid-email': 'El correo ingresado no es válido.',
    'auth/user-disabled': 'Esta cuenta está deshabilitada.',
    'auth/user-not-found': 'No existe una cuenta con ese correo.',
    'auth/wrong-password': 'Contraseña incorrecta.',
    'auth/invalid-credential': 'Correo o contraseña incorrectos.',
    'auth/too-many-requests': 'Demasiados intentos. Intenta más tarde.',
    'auth/email-already-in-use': 'Ese correo ya está registrado.',
    'auth/weak-password': 'La contraseña debe tener al menos 6 caracteres.'
  };
  return map[e.code] || ('Ocurrió un error: ' + (e.message || e.code || ''));
}

function clientesFiltrados(){
  const activos = state.clientes.filter(c => c.estado !== 'papelera');
  const f = state.filtro.trim().toLowerCase();
  if(!f) return activos;
  return activos.filter(c =>
    (c.nombre||'').toLowerCase().includes(f) ||
    limpiarRut(c.rut||'').toLowerCase().includes(limpiarRut(f).toLowerCase() || f)
  );
}

function nombreUsuario(uid){
  const u = state.usuarios.find(u=>u.id===uid);
  return u ? u.nombre : '—';
}

function abrirFichaCliente(id){
  state.clienteActivoId = id;
  state.tabDetalle = 'ficha';
  state.indicadorAbierto = null;
  cargarSubdatosCliente(id);
  renderModalFicha();
}
function clienteActivo(){
  return state.clientes.find(c=>c.id === state.clienteActivoId);
}
function cargarSubdatosCliente(id){
  if(state.clienteCache[id]) return;
  state.clienteCache[id] = { archivos: [], periodos: [] };
  const unsubA = db.collection('clientes').doc(id).collection('archivos')
    .onSnapshot(snap=>{
      state.clienteCache[id].archivos = snap.docs.map(d=>({id:d.id, ...d.data()}));
      if(state.clienteActivoId === id) actualizarPanelSiAbierto();
    });
  const unsubP = db.collection('clientes').doc(id).collection('periodos')
    .onSnapshot(snap=>{
      state.clienteCache[id].periodos = snap.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=> (b.id||'').localeCompare(a.id||''));
      if(!state.periodoIndicador && state.clienteCache[id].periodos.length){
        state.periodoIndicador = state.clienteCache[id].periodos[0].id;
      }
      if(state.clienteActivoId === id) actualizarPanelSiAbierto();
    });
  state.clienteCache[id].unsub = ()=>{ unsubA(); unsubP(); };
}
function actualizarPanelSiAbierto(){
  const ov = document.getElementById('ovFicha');
  if(ov) renderModalFicha();
}

  }
  if(!state.periodoIndicador || !periodos.find(p=>p.id===state.periodoIndicador)) state.periodoIndicador = periodos[0].id;
  const periodo = periodos.find(p=>p.id === state.periodoIndicador);
  const cuentas = periodo.cuentas || [];
  const vals = valoresPorCategoria(cuentas);
  const indicadores = calcularIndicadores(vals);

  return `
  <div class="periodo-select">
    <label style="font-size:12.5px; font-weight:600; color:var(--texto-suave);">Período</label>
    <select id="selPeriodo">
      ${periodos.map(p=>`<option value="${p.id}" ${p.id===state.periodoIndicador?'selected':''}>${esc(p.id)}</option>`).join('')}
    </select>
    <button class="btn btn-secondary btn-sm" id="btnMapearCuentas">Clasificar cuentas</button>
    <button class="btn btn-secondary btn-sm" id="exportarIndicadoresExcel">Exportar Excel</button>
    <button class="btn btn-secondary btn-sm" id="exportarIndicadoresPDF">Exportar PDF</button>
  </div>
  <div class="ind-grid">
    ${indicadores.map(ind => `
      <div class="ind-card" data-ind="${ind.key}">
        <div class="lbl">${ind.label}</div>
        <div class="val ${ind.valor===null?'nd':''}">${ind.valor===null ? 'N/D — falta clasificar cuentas' : ind.textoValor}</div>
      </div>`).join('')}
  </div>
  ${state.indicadorAbierto ? renderDetalleIndicador(indicadores.find(i=>i.key===state.indicadorAbierto), cuentas) : ''}
  `;
}

function valoresPorCategoria(cuentas){
  const sum = (key) => {
    const filtradas = cuentas.filter(c=>c.categoria === key);
    if(filtradas.length === 0) return null;
    return filtradas.reduce((acc,c)=> acc + (parseFloat(c.monto)||0), 0);
  };
  const sumaOpcional = (...keys) => {
    const partes = keys.map(k=>sum(k)).filter(v=>v !== null);
    if(partes.length === 0) return null;
    return partes.reduce((a,b)=>a+b, 0);
  };
  return {
    activo_circulante: sum('activo_circulante'),
    existencias: sum('existencias'),
    pasivo_circulante: sum('pasivo_circulante'),
    total_activo: sumaOpcional('total_activo', 'activo_circulante', 'activo_fijo'),
    total_pasivo: sumaOpcional('total_pasivo', 'pasivo_circulante', 'pasivo_otro'),
    patrimonio: sum('patrimonio'),
    ventas: sum('ventas'),
    utilidad: sum('utilidad')
  };
}

function calcularIndicadores(v){
  const list = [];
  // Liquidez corriente
  {
    const val = (v.activo_circulante!==null && v.pasivo_circulante) ? v.activo_circulante / v.pasivo_circulante : null;
    list.push({ key:'liquidez', label:'Liquidez corriente', valor: val, textoValor: fmtVeces(val),
      formula:'Activo Circulante ÷ Pasivo Circulante', cuentasClave:['activo_circulante','pasivo_circulante'] });
  }
  // Prueba ácida
  {
    const num = (v.activo_circulante!==null) ? v.activo_circulante - (v.existencias||0) : null;
    const val = (num!==null && v.pasivo_circulante) ? num / v.pasivo_circulante : null;
    list.push({ key:'acida', label:'Prueba ácida', valor: val, textoValor: fmtVeces(val),
      formula:'(Activo Circulante − Existencias) ÷ Pasivo Circulante', cuentasClave:['activo_circulante','existencias','pasivo_circulante'] });
  }
  // Capital de trabajo
  {
    const val = (v.activo_circulante!==null && v.pasivo_circulante!==null) ? v.activo_circulante - v.pasivo_circulante : null;
    list.push({ key:'capital', label:'Capital de trabajo', valor: val, textoValor: val===null?null:fmtMoney(val),
      formula:'Activo Circulante − Pasivo Circulante', cuentasClave:['activo_circulante','pasivo_circulante'] });
  }
  // Endeudamiento total
  {
    const val = (v.total_pasivo!==null && v.total_activo) ? v.total_pasivo / v.total_activo : null;
    list.push({ key:'endeud_total', label:'Endeudamiento total', valor: val, textoValor: fmtVeces(val),
      formula:'Total Pasivos ÷ Total Activos', cuentasClave:['total_pasivo','total_activo','pasivo_circulante','pasivo_otro','activo_circulante','activo_fijo'] });
  }
  // Endeudamiento patrimonial
  {
    const val = (v.total_pasivo!==null && v.patrimonio) ? v.total_pasivo / v.patrimonio : null;
    list.push({ key:'endeud_patrim', label:'Endeudamiento patrimonial', valor: val, textoValor: fmtVeces(val),
      formula:'Total Pasivos ÷ Patrimonio', cuentasClave:['total_pasivo','patrimonio'] });
  }
  // ROE
  {
    const val = (v.utilidad!==null && v.patrimonio) ? v.utilidad / v.patrimonio : null;
    list.push({ key:'roe', label:'Rentabilidad del patrimonio (ROE)', valor: val, textoValor: fmtPct(val),
      formula:'Utilidad del Ejercicio ÷ Patrimonio', cuentasClave:['utilidad','patrimonio'] });
  }
  // ROA
  {
    const val = (v.utilidad!==null && v.total_activo) ? v.utilidad / v.total_activo : null;
    list.push({ key:'roa', label:'Rentabilidad del activo (ROA)', valor: val, textoValor: fmtPct(val),
      formula:'Utilidad del Ejercicio ÷ Total Activos', cuentasClave:['utilidad','total_activo','activo_circulante','activo_fijo'] });
  }
  // Rotación de activos
  {
    const val = (v.ventas!==null && v.total_activo) ? v.ventas / v.total_activo : null;
    list.push({ key:'rotacion', label:'Rotación de activos', valor: val, textoValor: fmtVeces(val),
      formula:'Ventas ÷ Total Activos', cuentasClave:['ventas','total_activo','activo_circulante','activo_fijo'] });
  }
  return list;
}

function renderDetalleIndicador(ind, cuentas){
  if(!ind) return '';
  const relevantes = cuentas.filter(c => ind.cuentasClave.includes(c.categoria));
  return `
  <div class="ind-detail">
    <strong>${ind.label}</strong>
    <div class="formula">Fórmula: ${ind.formula}</div>
    ${relevantes.length === 0 ? `<div style="font-size:12.5px; color:var(--texto-suave);">No hay cuentas clasificadas para este indicador todavía.</div>` : `
    <table>
      <thead><tr><th>Cuenta</th><th>Categoría</th><th>Monto</th></tr></thead>
      <tbody>
        ${relevantes.map(c => `<tr><td>${esc(c.nombre)}</td><td>${esc(CATEGORIAS_CUENTA.find(k=>k.key===c.categoria)?.label || c.categoria)}</td><td>${fmtMoney(c.monto)}</td></tr>`).join('')}
      </tbody>
    </table>`}
  </div>`;
}

/* ---- Carga de archivos + parseo de balances/EE.RR. ---- */
function subirArchivo(tipo, file){
  if(!file) return;
  const clienteId = state.clienteActivoId;
  const esBalanceOEerr = (tipo === 'balance' || tipo === 'eerr');
  const nombreLimpio = file.name;
  const path = `clientes/${clienteId}/${tipo}/${Date.now()}_${nombreLimpio}`;
  const ref = storage.ref().child(path);

  toast('Subiendo ' + nombreLimpio + '…');
  ref.put(file).then(async (snap)=>{
    const url = await snap.ref.getDownloadURL();
    await db.collection('clientes').doc(clienteId).collection('archivos').add({
      tipo, nombre: nombreLimpio, url, path,
      estado: 'activo',
      fecha: firebase.firestore.FieldValue.serverTimestamp(),
      subidoPor: state.user.uid
    });
    toast('Archivo cargado correctamente.', 'ok');

    if(esBalanceOEerr && /\.(xlsx|xls|csv)$/i.test(nombreLimpio)){
      try{ await parsearYGuardarBalance(clienteId, file, tipo); }
      catch(err){ console.error(err); toast('El archivo se guardó, pero no se pudo leer para calcular indicadores.', 'err'); }
    }
  }).catch(err=>{
    console.error(err);
    toast('No se pudo subir el archivo: ' + (err.code || err.message || 'error desconocido'), 'err');
  });
}

/* --- Normaliza texto para comparar encabezados sin tildes/mayúsculas --- */
function normTxt(s){
  return String(s ?? '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}
function aNumero(v){
  if(typeof v === 'number'){
    // Corrige un artefacto común en balances exportados: un separador de miles
    // que quedó interpretado como decimal (ej: 95.921 realmente es $95.921 = 95921)
    if(!Number.isInteger(v)){
      const dec = String(v).split('.')[1] || '';
      if(dec.length === 3) return Math.round(v * 1000);
    }
    return v;
  }
  if(v === null || v === undefined || v === '') return 0;
  let s = String(v).trim();
  if(s === '') return 0;
  const tieneComa = s.includes(',');
  const tienePunto = s.includes('.');
  if(tieneComa && tienePunto){
    if(s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g, '').replace(',', '.');
    else s = s.replace(/,/g, '');
  } else if(tieneComa){
    const partes = s.split(',');
    if(partes.length === 2 && partes[1].length <= 2) s = s.replace(',', '.');
    else s = s.replace(/,/g, '');
  } else if(tienePunto){
    const partes = s.split('.');
    if(!(partes.length === 2 && partes[1].length <= 2)) s = s.replace(/\./g, '');
  }
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

/* --- Detecta en qué fila están los encabezados y qué formato es --- */
function detectarEncabezado(rows){
  for(let i = 0; i < Math.min(rows.length, 15); i++){
    const fila = (rows[i] || []).map(normTxt);
    if(fila.length === 0) continue;

    // Formato "Balance 8 columnas" (Chile): Cuenta, Descripción, Debe, Haber, Deudor, Acreedor, Activo, Pasivo, Perdida, Ganancia
    const iCuenta = fila.findIndex(c=>c === 'cuenta' || c.startsWith('cuenta'));
    const iDescripcion = fila.findIndex(c=>c.includes('descripcion'));
    const iActivo = fila.findIndex(c=>c.includes('activo'));
    const iPasivo = fila.findIndex(c=>c.includes('pasivo'));
    const iPerdida = fila.findIndex(c=>c.includes('perdida'));
    const iGanancia = fila.findIndex(c=>c.includes('ganancia'));
    if(iCuenta !== -1 && iDescripcion !== -1 && iActivo !== -1 && iPasivo !== -1 && (iPerdida !== -1 || iGanancia !== -1)){
      return { formato:'ocho_columnas', filaIni:i+1, iCuenta, iDescripcion, iActivo, iPasivo, iPerdida, iGanancia };
    }

    // Formato plantilla propia: Categoría, Cuenta, Monto
    const iCategoria = fila.findIndex(c=>c.includes('categoria'));
    const iMontoPlant = fila.findIndex(c=>c.includes('monto'));
    if(iCategoria !== -1 && iMontoPlant !== -1){
      const iCuentaPlant = fila.findIndex(c=>c.includes('cuenta') || c.includes('detalle'));
      return { formato:'plantilla', filaIni:i+1, iCategoria, iCuenta: iCuentaPlant, iMonto: iMontoPlant };
    }

    // Formato genérico: Cuenta/Concepto/Detalle + Monto/Saldo/Valor/Total
    const iCtaGen = fila.findIndex(c=>c.includes('cuenta') || c.includes('concepto') || c.includes('detalle'));
    const iMontoGen = fila.findIndex(c=>c.includes('monto') || c.includes('saldo') || c.includes('valor') || c.includes('total'));
    if(iCtaGen !== -1 && iMontoGen !== -1 && iCtaGen !== iMontoGen){
      return { formato:'generico', filaIni:i+1, iCuenta: iCtaGen, iMonto: iMontoGen };
    }
  }
  return null;
}

/* --- Clasifica una cuenta del Balance 8 columnas según el prefijo de su código --- */
function categoriaPorCodigo(codigo, descripcion){
  const cod = String(codigo || '').trim();
  const desc = normTxt(descripcion);
  if(/^1\.1/.test(cod)){
    if(/mercader|existenc|inventario/.test(desc)) return 'existencias';
    return 'activo_circulante';
  }
  if(/^1\./.test(cod)) return 'activo_fijo';
  if(/^2\.4/.test(cod)) return 'patrimonio';
  if(/^2\.[123]/.test(cod)) return 'pasivo_circulante';
  if(/^2\./.test(cod)) return 'pasivo_otro';
  if(/^3\.1/.test(cod)) return 'ventas';
  if(/^3\./.test(cod)) return 'ingresos_otros';
  if(/^4\./.test(cod)) return 'gastos';
  return '';
}

/* --- Parser del formato "Balance 8 columnas" (código de cuenta define la categoría) --- */
function parsearOchoColumnas(rows, det){
  const cuentas = [];
  // Si el encabezado de "Pérdida" vino con la codificación dañada, se asume que está
  // inmediatamente antes de la columna "Ganancia" (orden estándar del balance de 8 columnas).
  const iPerdida = det.iPerdida !== -1 ? det.iPerdida : (det.iGanancia !== -1 ? det.iGanancia - 1 : -1);
  for(let i = det.filaIni; i < rows.length; i++){
    const fila = rows[i];
    if(!fila || fila.length === 0) continue;
    const codigo = String(fila[det.iCuenta] ?? '').trim();
    const descripcion = String(fila[det.iDescripcion] ?? '').trim();
    if(!codigo || !/^\d/.test(codigo)) continue; // ignora filas de totales/encabezados intermedios
    const activo = aNumero(fila[det.iActivo]);
    const pasivo = aNumero(fila[det.iPasivo]);
    const perdida = iPerdida !== -1 ? aNumero(fila[iPerdida]) : 0;
    const ganancia = det.iGanancia !== -1 ? aNumero(fila[det.iGanancia]) : 0;
    const cat = categoriaPorCodigo(codigo, descripcion);
    let monto = 0;
    if(cat === 'ventas' || cat === 'ingresos_otros') monto = ganancia - perdida;
    else if(cat === 'gastos') monto = perdida - ganancia; // valor positivo = gasto real
    else if(cat === 'pasivo_circulante' || cat === 'pasivo_otro' || cat === 'patrimonio') monto = pasivo - activo; // saldo normal acreedor
    else monto = activo - pasivo; // activo_circulante / activo_fijo / existencias: saldo normal deudor
    if(activo === 0 && pasivo === 0 && perdida === 0 && ganancia === 0) continue;
    cuentas.push({ nombre: descripcion || codigo, codigo, monto, categoria: cat, origen:'balance8col' });
  }
  // Calcula la utilidad del ejercicio como Ingresos - Gastos y la agrega como una cuenta consolidada
  const ingresos = cuentas.filter(c=>c.categoria==='ventas'||c.categoria==='ingresos_otros').reduce((a,c)=>a+c.monto,0);
  const gastos = cuentas.filter(c=>c.categoria==='gastos').reduce((a,c)=>a+c.monto,0);
  cuentas.push({ nombre:'Utilidad del Ejercicio (calculada)', codigo:'', monto: ingresos - gastos, categoria:'utilidad', origen:'balance8col' });
  return cuentas;
}

/* --- Parser de la plantilla propia (Categoría | Cuenta | Monto) --- */
function parsearPlantilla(rows, det){
  const mapaCategorias = {};
  CATEGORIAS_CUENTA.forEach(c=>{ if(c.key) mapaCategorias[normTxt(c.label)] = c.key; });
  const cuentas = [];
  for(let i = det.filaIni; i < rows.length; i++){
    const fila = rows[i];
    if(!fila || fila.length === 0) continue;
    const catTexto = normTxt(fila[det.iCategoria]);
    const monto = aNumero(fila[det.iMonto]);
    const nombre = det.iCuenta !== -1 ? String(fila[det.iCuenta] ?? '').trim() : '';
    if(!catTexto || (monto === 0 && !nombre)) continue;
    const categoria = mapaCategorias[catTexto] || '';
    cuentas.push({ nombre: nombre || (CATEGORIAS_CUENTA.find(c=>c.key===categoria)?.label || catTexto), monto, categoria, origen:'plantilla' });
  }
  return cuentas;
}

/* --- Parser genérico: 2 columnas, requiere clasificación manual posterior --- */
function parsearGenerico(rows, det, cuentasExistentes){
  const cuentas = [];
  for(let i = det.filaIni; i < rows.length; i++){
    const fila = rows[i];
    if(!fila || fila.length === 0) continue;
    const nombre = String(fila[det.iCuenta] ?? '').trim();
    const monto = aNumero(fila[det.iMonto]);
    if(!nombre || (monto === 0 && fila[det.iMonto] === '')) continue;
    const previa = cuentasExistentes.find(c=>c.nombre === nombre);
    cuentas.push({ nombre, monto, categoria: previa ? previa.categoria : sugerirCategoria(nombre), origen:'generico' });
  }
  return cuentas;
}

function parsearYGuardarBalance(clienteId, file, tipo){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = async (e)=>{
      try{
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type:'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' });

        const det = detectarEncabezado(rows);
        if(!det){
          toast('No reconocí el formato de este archivo. Descarga la plantilla en la pestaña Archivos y súbela con ese formato para que los indicadores se calculen igual.', 'err');
          resolve();
          return;
        }

        let cuentas = [];
        if(det.formato === 'ocho_columnas') cuentas = parsearOchoColumnas(rows, det);
        else if(det.formato === 'plantilla') cuentas = parsearPlantilla(rows, det);
        else {
          const cuentasExistentes = await obtenerCuentasPrevias(clienteId);
          cuentas = parsearGenerico(rows, det, cuentasExistentes);
        }

        if(cuentas.length === 0){
          toast('El archivo se reconoció pero no se encontraron cuentas con montos. Revisa el archivo o usa la plantilla de carga.', 'err');
          resolve();
          return;
        }

        if(det.formato === 'ocho_columnas'){
          const sum = (cat)=>cuentas.filter(c=>c.categoria===cat).reduce((a,c)=>a+c.monto,0);
          const totalActivo = sum('activo_circulante') + sum('activo_fijo');
          const totalPasivoPatrimUtil = sum('pasivo_circulante') + sum('pasivo_otro') + sum('patrimonio') + sum('utilidad');
          const base = Math.max(Math.abs(totalActivo), 1);
          const diffPct = Math.abs(totalActivo - totalPasivoPatrimUtil) / base;
          if(diffPct > 0.02){
            toast('Aviso: el Activo detectado no cuadra exactamente con Pasivo + Patrimonio + Utilidad (diferencia ' + (diffPct*100).toFixed(1) + '%). Revisa la clasificación de cuentas antes de confiar en los indicadores.', 'err');
          }
        }

        const periodo = prompt('¿A qué período (ej: 2025-12) corresponde este archivo?', new Date().toISOString().slice(0,7)) || new Date().toISOString().slice(0,7);
        const ref = db.collection('clientes').doc(clienteId).collection('periodos').doc(periodo);
        const prevSnap = await ref.get();
        const cuentasNuevas = cuentas.map(c=>({...c, origenTipo: tipo}));
        let cuentasFinal = cuentasNuevas;
        if(prevSnap.exists){
          const previas = prevSnap.data().cuentas || [];
          cuentasFinal = previas.filter(c=>c.origenTipo !== tipo).concat(cuentasNuevas);
        }
        await ref.set({ cuentas: cuentasFinal, actualizadoEn: firebase.firestore.FieldValue.serverTimestamp() }, { merge:true });
        state.periodoIndicador = periodo;
        const detectadoTxt = det.formato === 'ocho_columnas' ? 'Balance de 8 columnas (clasificado automáticamente)' : det.formato === 'plantilla' ? 'Plantilla de carga (clasificado automáticamente)' : 'Formato genérico (revisa la clasificación)';
        toast(`Cuentas detectadas: ${cuentas.length}. Formato: ${detectadoTxt}.`, 'ok');
        resolve();
      }catch(err){ reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

async function obtenerCuentasPrevias(clienteId){
  const snap = await db.collection('clientes').doc(clienteId).collection('periodos').get();
  let todas = [];
  snap.forEach(d=>{ todas = todas.concat(d.data().cuentas || []); });
  return todas;
}

  const c = clienteActivo();
  const cache = state.clienteCache[c.id];
  const periodo = cache.periodos.find(p=>p.id === state.periodoIndicador);
  const cuentas = periodo.cuentas || [];
  const html = `
  <div class="confirm-overlay" id="ovMapeo">
    <div class="confirm-box" style="width:min(560px,92vw); max-height:80vh; overflow-y:auto;">
      <p style="margin-bottom:6px;"><strong>Clasificar cuentas — ${esc(periodo.id)}</strong></p>
      <p style="margin-top:0; font-size:12px;">Asigna cada cuenta a la categoría que usarán los indicadores financieros.</p>
      <table class="map-table" style="width:100%;">
        ${cuentas.map((cta, idx) => `
          <tr>
            <td style="font-size:12.5px;">${esc(cta.nombre)}<br><span style="color:var(--texto-suave); font-size:11px;">${fmtMoney(cta.monto)}</span></td>
            <td>
              <select data-map-idx="${idx}">
                ${CATEGORIAS_CUENTA.map(cat=>`<option value="${cat.key}" ${cta.categoria===cat.key?'selected':''}>${cat.label}</option>`).join('')}
              </select>
            </td>
          </tr>`).join('')}
      </table>
      <div class="row" style="margin-top:16px;">
        <button class="btn btn-secondary btn-sm" id="cancelarMapeo">Cancelar</button>
        <button class="btn btn-primary btn-sm" id="guardarMapeo">Guardar clasificación</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalRoot').insertAdjacentHTML('beforeend', html);
  document.getElementById('cancelarMapeo').addEventListener('click', ()=> document.getElementById('ovMapeo').remove());
  document.getElementById('guardarMapeo').addEventListener('click', async ()=>{
    document.querySelectorAll('[data-map-idx]').forEach(sel=>{
      const idx = parseInt(sel.getAttribute('data-map-idx'), 10);
      cuentas[idx].categoria = sel.value;
    });
    await db.collection('clientes').doc(c.id).collection('periodos').doc(periodo.id).set({ cuentas }, { merge:true });
    document.getElementById('ovMapeo').remove();
    toast('Clasificación guardada.', 'ok');
  });
}

/* =========================================================
   PAPELERA
   ========================================================= */
function renderVistaPapelera(){
  return `
  <div class="pill-row">
    <button class="pill ${state.papeleraTab==='clientes'?'active':''}" data-ptab="clientes">Clientes</button>
    <button class="pill ${state.papeleraTab==='archivos'?'active':''}" data-ptab="archivos">Archivos</button>
  </div>
  <div class="card">
    ${state.papeleraTab === 'clientes' ? renderPapeleraClientes() : renderPapeleraArchivos()}
  </div>`;
}
function renderPapeleraClientes(){
  const eliminados = state.clientes.filter(c=>c.estado === 'papelera');
  if(eliminados.length === 0) return `<div class="empty"><div class="ico">🗑️</div><div>No hay clientes en la papelera.</div></div>`;
  return `<table><thead><tr><th>Empresa</th><th>RUT</th><th>Eliminado</th><th></th></tr></thead><tbody>
    ${eliminados.map(c=>`
      <tr>
        <td><strong>${esc(c.nombre)}</strong></td>
        <td>${esc(c.rut)}</td>
        <td>${fmtFecha(c.eliminadoEn)}</td>
        <td class="row-actions">
          <button class="btn btn-secondary btn-sm" data-restaurar-cliente="${c.id}">Restaurar</button>
          ${state.user.rol==='admin' ? `<button class="btn btn-danger btn-sm" data-borrar-def-cliente="${c.id}">Eliminar definitivo</button>` : ''}
        </td>
      </tr>`).join('')}
  </tbody></table>`;
}
function renderPapeleraArchivos(){
  // Recolecta archivos en papelera de todos los clientes cacheados; si aún no se han cargado, se pide cargar cliente a cliente.
  let filas = [];
  Object.keys(state.clienteCache).forEach(cid=>{
    const cliente = state.clientes.find(c=>c.id===cid);
    (state.clienteCache[cid].archivos || []).filter(a=>a.estado==='papelera').forEach(a=>{
      filas.push({ ...a, clienteId: cid, clienteNombre: cliente ? cliente.nombre : '—' });
    });
  });
  if(filas.length === 0){
    return `<div class="empty"><div class="ico">🗑️</div><div>No hay archivos en la papelera (de los clientes que has abierto en esta sesión).</div></div>`;
  }
  return `<table><thead><tr><th>Archivo</th><th>Cliente</th><th>Tipo</th><th></th></tr></thead><tbody>
    ${filas.map(a=>`
      <tr>
        <td>${esc(a.nombre)}</td>
        <td>${esc(a.clienteNombre)}</td>
        <td>${esc(CATEGORIAS_ARCHIVO.find(c=>c.key===a.tipo)?.label || a.tipo)}</td>
        <td class="row-actions">
          <button class="btn btn-secondary btn-sm" data-restaurar-archivo="${a.clienteId}|${a.id}">Restaurar</button>
          ${state.user.rol==='admin' ? `<button class="btn btn-danger btn-sm" data-borrar-def-archivo="${a.clienteId}|${a.id}|${esc(a.path||'')}">Eliminar definitivo</button>` : ''}
        </td>
      </tr>`).join('')}
  </tbody></table>`;
}
function bindVistaPapelera(){
  document.querySelectorAll('[data-ptab]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.papeleraTab = btn.getAttribute('data-ptab');
      document.getElementById('contentArea').innerHTML = renderVistaPapelera();
      bindVistaPapelera();
    });
  });
  document.querySelectorAll('[data-restaurar-cliente]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      await db.collection('clientes').doc(btn.getAttribute('data-restaurar-cliente')).update({ estado:'activo' });
      toast('Cliente restaurado.', 'ok');
    });
  });
  document.querySelectorAll('[data-borrar-def-cliente]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const id = btn.getAttribute('data-borrar-def-cliente');
      confirmar('Esta acción eliminará el cliente de forma permanente. No se puede deshacer. ¿Continuar?', async ()=>{
        await db.collection('clientes').doc(id).delete();
        toast('Cliente eliminado definitivamente.', 'ok');
      });
    });
  });
  document.querySelectorAll('[data-restaurar-archivo]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const [cid, aid] = btn.getAttribute('data-restaurar-archivo').split('|');
      await db.collection('clientes').doc(cid).collection('archivos').doc(aid).update({ estado:'activo' });
      toast('Archivo restaurado.', 'ok');
      document.getElementById('contentArea').innerHTML = renderVistaPapelera();
      bindVistaPapelera();
    });
  });
  document.querySelectorAll('[data-borrar-def-archivo]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const [cid, aid, path] = btn.getAttribute('data-borrar-def-archivo').split('|');
      confirmar('Esta acción eliminará el archivo de forma permanente. ¿Continuar?', async ()=>{
        try{ if(path) await storage.ref().child(path).delete(); }catch(e){}
        await db.collection('clientes').doc(cid).collection('archivos').doc(aid).delete();
        toast('Archivo eliminado definitivamente.', 'ok');
        document.getElementById('contentArea').innerHTML = renderVistaPapelera();
        bindVistaPapelera();
      });
    });
  });
}

/* =========================================================
   Confirmación genérica
   ========================================================= */
function confirmar(msg, onOk){
  const html = `
  <div class="confirm-overlay" id="ovConfirm">
    <div class="confirm-box">
      <p>${esc(msg)}</p>
      <div class="row">
        <button class="btn btn-secondary btn-sm" id="confirmCancel">Cancelar</button>
        <button class="btn btn-danger btn-sm" id="confirmOk">Confirmar</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalRoot').insertAdjacentHTML('beforeend', html);
  document.getElementById('confirmCancel').addEventListener('click', ()=> document.getElementById('ovConfirm').remove());
  document.getElementById('confirmOk').addEventListener('click', async ()=>{
    document.getElementById('ovConfirm').remove();
    await onOk();
  });
}

/* =========================================================
   Autenticación / arranque
   ========================================================= */
auth.onAuthStateChanged(async (fbUser)=>{
  if(state.unsubClientes){ state.unsubClientes(); state.unsubClientes = null; }
  if(state.unsubUsuarios){ state.unsubUsuarios(); state.unsubUsuarios = null; }

  if(!fbUser){
    state.user = null;
    render();
    return;
  }
  try{
    const doc = await db.collection('usuarios').doc(fbUser.uid).get();
    if(!doc.exists){
      toast('Tu cuenta no tiene un rol asignado. Contacta al administrador.', 'err');
      await auth.signOut();
      return;
    }
    const d = doc.data();
    state.user = { uid: fbUser.uid, nombre: d.nombre || fbUser.email, email: fbUser.email, rol: d.rol || 'contador' };

    state.unsubUsuarios = db.collection('usuarios').onSnapshot(snap=>{
      state.usuarios = snap.docs.map(d=>({id:d.id, ...d.data()}));
      if(document.getElementById('app') && state.user) refrescarSuave();
    });
    state.unsubClientes = db.collection('clientes').orderBy('nombre').onSnapshot(snap=>{
      state.clientes = snap.docs.map(d=>({id:d.id, ...d.data()}));
      if(document.getElementById('app') && state.user) refrescarSuave();
    });

    render();
  }catch(e){
    console.error(e);
    toast('Error al cargar tu perfil.', 'err');
  }
});

/* Refresca listas visibles sin cerrar modales abiertos innecesariamente */
function refrescarSuave(){
  const modalAbierto = document.getElementById('modalRoot') && document.getElementById('modalRoot').innerHTML.trim() !== '';
  if(!modalAbierto){
    render();
    return;
  }
  // Si hay ficha de cliente abierta, solo refrescamos su contenido
  if(document.getElementById('ovFicha')){
    renderModalFicha();
  }
  // Refresca listas de fondo igualmente (tablas detrás del modal)
  const contentArea = document.getElementById('contentArea');
  if(contentArea){
    contentArea.innerHTML = renderContenidoVista();
    if(state.vista==='clientes') bindVistaClientes();
    if(state.vista==='papelera') bindVistaPapelera();
    if(state.vista==='usuarios') bindVistaUsuarios();
  }
}
