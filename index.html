<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard Contable</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f4f5f7;color:#1a1a1a;font-size:13px}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a4a7a 0%,#378ADD 100%)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.login-box h1{font-size:22px;font-weight:700;margin-bottom:4px}
.login-box p{font-size:13px;color:#888;margin-bottom:28px}
.login-logo{font-size:40px;margin-bottom:16px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.fg input{width:100%;border:1px solid #d0d0d0;border-radius:8px;padding:10px 12px;font-size:13px;outline:none;transition:border .2s}
.fg input:focus{border-color:#378ADD}
.btn-login{width:100%;background:#378ADD;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-login:hover{background:#185FA5}
.login-err{background:#FCEBEB;color:#A32D2D;border-radius:8px;padding:10px 14px;font-size:12px;margin-bottom:16px;display:none}
.login-link{text-align:center;margin-top:16px;font-size:12px;color:#888}
.login-link a{color:#378ADD;cursor:pointer;font-weight:500}
#app{display:none}
.topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:9px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.topbar h1{font-size:14px;font-weight:600;flex:1;min-width:100px}
.btn{background:#378ADD;color:#fff;border:none;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .2s}
.btn:hover{background:#185FA5}
.btn-g{background:#1D9E75}.btn-g:hover{background:#0F6E56}
.btn-o{background:#fff;color:#378ADD;border:1px solid #378ADD}.btn-o:hover{background:#E6F1FB}
.btn-r{background:#E24B4A}.btn-r:hover{background:#A32D2D}
.btn-p{background:#534AB7}
.btn-sm{padding:4px 9px;font-size:11px}
.badge{font-size:11px;padding:3px 8px;border-radius:20px;background:#f0f0f0;color:#888}
.badge.ok{background:#EAF3DE;color:#3B6D11}
.badge.ok2{background:#E1F5EE;color:#0F6E56}
.badge.loading{background:#E6F1FB;color:#185FA5}
.expbar{background:#fff;border-bottom:1px solid #eee;padding:7px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.layout{display:flex;height:calc(100vh - 92px)}
.left{flex:1;overflow-y:auto;padding:14px;min-width:0}
.right{width:300px;border-left:1px solid #e0e0e0;background:#fff;display:flex;flex-direction:column;flex-shrink:0}
#carteraView{padding:20px;max-width:900px;margin:0 auto}
#carteraView h2{font-size:18px;font-weight:600;margin-bottom:16px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}
.ccrd{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s}
.ccrd:hover{border-color:#378ADD;box-shadow:0 4px 12px rgba(55,138,221,.15)}
.ccrd .cn{font-size:14px;font-weight:600;margin-bottom:3px}
.ccrd .cr{font-size:12px;color:#888;margin-bottom:8px}
.ccrd .cb{display:flex;gap:6px;flex-wrap:wrap}
.cbg{font-size:10px;padding:2px 7px;border-radius:10px;background:#E6F1FB;color:#185FA5}
.cbg.g{background:#EAF3DE;color:#3B6D11}
.add-c{background:#fff;border:2px dashed #d0d0d0;border-radius:10px;padding:16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;color:#aaa;font-size:13px;min-height:100px}
.add-c:hover{border-color:#378ADD;color:#378ADD}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:28px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px}
.mfg{margin-bottom:14px}
.mfg label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:4px;text-transform:uppercase}
.mfg input{width:100%;border:1px solid #d0d0d0;border-radius:7px;padding:8px 10px;font-size:13px;outline:none}
.mfg input:focus{border-color:#378ADD}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.ch{padding:9px 12px;border-bottom:1px solid #eee;font-size:12px;font-weight:600}
.msgs{flex:1;overflow-y:auto;padding:9px;display:flex;flex-direction:column;gap:7px}
.msg{padding:7px 10px;border-radius:9px;font-size:12px;line-height:1.5;word-break:break-word}
.msg.ai{background:#f0f7ff;border-bottom-left-radius:3px}
.msg.ai strong{color:#185FA5}
.msg.user{background:#378ADD;color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.sugbox{padding:0 8px 8px;display:flex;flex-direction:column;gap:3px}
.sug{background:#f4f7fb;border:1px solid #dde8f5;border-radius:6px;padding:4px 8px;font-size:11px;color:#378ADD;cursor:pointer;text-align:left}
.sug:hover{background:#E6F1FB}
.inp-area{padding:8px;border-top:1px solid #eee;display:flex;gap:5px}
.inp-area textarea{flex:1;border:1px solid #d0d0d0;border-radius:7px;padding:6px 8px;font-size:12px;font-family:inherit;resize:none;outline:none;height:50px}
.inp-area textarea:focus{border-color:#378ADD}
.sbtn{background:#378ADD;color:#fff;border:none;border-radius:7px;padding:0 11px;cursor:pointer;font-size:15px;align-self:stretch}
.sbtn:disabled{background:#aaa;cursor:not-allowed}
.tabs{display:flex;gap:2px;margin-bottom:12px;background:#eee;border-radius:8px;padding:3px}
.tab{flex:1;text-align:center;padding:6px 4px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;color:#888;border:none;background:transparent;transition:all .2s}
.tab.on{background:#fff;color:#378ADD;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.sl{font-size:10px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:7px;margin-bottom:11px}
.k{background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #e8e8e8;cursor:pointer;transition:box-shadow .15s}
.k:hover{box-shadow:0 0 0 2px #378ADD44}
.kl{font-size:10px;color:#888;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.kv{font-size:18px;font-weight:600}
.ks{font-size:10px;color:#bbb;margin-top:2px}
.gd{color:#1D9E75}.wd{color:#BA7517}.bd{color:#E24B4A}
.cr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
.card{background:#fff;border-radius:8px;border:1px solid #e8e8e8;padding:11px}
.ct{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:7px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:10px;color:#888;font-weight:600;padding:5px 6px;border-bottom:1px solid #eee;background:#fafafa;text-transform:uppercase}
td{padding:5px 6px;border-bottom:1px solid #f2f2f2;color:#333}
tr:last-child td{border-bottom:none}
.tt td{font-weight:600;background:#fafafa}
.ts td{color:#666;padding-left:14px;font-size:11px}
.einfo{font-size:12px;color:#666;margin-bottom:10px;line-height:1.6}
.typing{display:flex;gap:3px;align-items:center;padding:2px 0}
.typing span{width:6px;height:6px;background:#378ADD;border-radius:50%;animation:bou 1s infinite}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes bou{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.hmc{width:100%;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.hmc:hover{opacity:.75}
.pcrd{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:10px 13px;display:flex;align-items:center;gap:10px;margin-bottom:7px}
.pcrd .pi{flex:1}
.pcrd .pn{font-weight:600;font-size:13px}
.pcrd .pm{font-size:11px;color:#aaa;margin-top:2px}
.pcrd .pb{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.pbg{font-size:10px;padding:2px 7px;border-radius:10px;background:#E6F1FB;color:#185FA5}
.pbg.gr{background:#EAF3DE;color:#3B6D11}
.pbg.rd{background:#FCEBEB;color:#A32D2D}
select{border:1px solid #d0d0d0;border-radius:6px;padding:4px 8px;font-size:12px;background:#fff;outline:none}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(55,138,221,.3);border-top-color:#378ADD;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:700px){.right{display:none}.layout{height:auto}.cr2{grid-template-columns:1fr}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">📊</div>
    <h1>Dashboard Contable</h1>
    <p>Accede a tu cartera de clientes</p>
    <div class="login-err" id="loginErr"></div>
    <div id="loginForm">
      <div class="fg"><label>Correo electronico</label><input type="email" id="lEmail" placeholder="contador@firma.cl" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="fg"><label>Contrasena</label><input type="password" id="lPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <button class="btn-login" id="lBtn" onclick="doLogin()">Iniciar sesion</button>
      <div class="login-link">No tienes cuenta? <a onclick="showReg()">Registrate aqui</a></div>
    </div>
    <div id="regForm" style="display:none">
      <div class="fg"><label>Nombre completo</label><input type="text" id="rNom" placeholder="Juan Perez"/></div>
      <div class="fg"><label>Correo electronico</label><input type="email" id="rEmail" placeholder="contador@firma.cl"/></div>
      <div class="fg"><label>Contrasena</label><input type="password" id="rPass" placeholder="Minimo 6 caracteres" onkeydown="if(event.key==='Enter')doReg()"/></div>
      <button class="btn-login" id="rBtn" onclick="doReg()">Crear cuenta</button>
      <div class="login-link"><a onclick="showLogin()">Volver al inicio de sesion</a></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <h1>📊 Dashboard Contable</h1>
    <button class="btn btn-o" id="btnV" onclick="goCartera()" style="display:none">← Cartera</button>
    <button class="btn btn-o" id="btnB" onclick="document.getElementById('fi').click()" style="display:none">📂 Balance</button>
    <input type="file" id="fi" accept=".pdf,.xlsx,.xls,.csv" style="display:none" onchange="loadFile(this,'b')"/>
    <button class="btn btn-g" id="btnR" onclick="document.getElementById('fir').click()" style="display:none">👥 Remuneraciones</button>
    <input type="file" id="fir" accept=".pdf,.xlsx,.xls,.csv" style="display:none" onchange="loadFile(this,'r')"/>
    <span class="badge" id="bb" style="display:none">Sin balance</span>
    <span class="badge" id="br" style="display:none">Sin rem.</span>
    <span id="uLabel" style="font-size:12px;color:#555"></span>
    <button class="btn btn-r btn-sm" onclick="doLogout()">Salir</button>
  </div>
  <div class="expbar" id="expbar" style="display:none">
    <span style="font-size:12px;color:#555;font-weight:500">Exportar:</span>
    <button class="btn btn-g" onclick="exportXL()">📊 Excel</button>
    <button class="btn btn-o" style="color:#E24B4A;border-color:#E24B4A" onclick="exportPDF()">📄 PDF</button>
  </div>

  <!-- CARTERA -->
  <div id="carteraView">
    <h2>Mi cartera de clientes</h2>
    <div class="cgrid" id="cgrid"><div style="text-align:center;padding:40px;color:#aaa;grid-column:1/-1"><span class="spin"></span> Cargando...</div></div>
  </div>

  <!-- DASHBOARD -->
  <div class="layout" id="dashView" style="display:none">
    <div class="left" id="left"><div style="text-align:center;padding:50px;color:#aaa"><span class="spin"></span></div></div>
    <div class="right">
      <div class="ch">Analista IA</div>
      <div class="msgs" id="msgs"><div class="msg ai">Selecciona un cliente para comenzar.</div></div>
      <div class="sugbox" id="sugs"></div>
      <div class="inp-area">
        <textarea id="ci" placeholder="Escribe tu pregunta..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button class="sbtn" id="sb" onclick="send()" disabled>↑</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL CLIENTE -->
<div class="mbg" id="mCliente" style="display:none">
  <div class="modal">
    <h3>Nuevo cliente</h3>
    <div class="mfg"><label>Nombre empresa</label><input type="text" id="mcN" placeholder="ACME S.A."/></div>
    <div class="mfg"><label>RUT</label><input type="text" id="mcR" placeholder="76.123.456-7"/></div>
    <div class="mfg"><label>Giro</label><input type="text" id="mcG" placeholder="Servicios de ingenieria"/></div>
    <div class="mfg"><label>Contacto</label><input type="text" id="mcC" placeholder="Juan Perez - juan@empresa.cl"/></div>
    <div class="mbtns">
      <button class="btn btn-o" onclick="cerrarModal()">Cancelar</button>
      <button class="btn" onclick="guardarCliente()">Guardar</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc, addDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDBlNoT-gzIfFvIbn-rc6VhdmuxEL9B5yM",
  authDomain: "dashboard-contable-b96fc.firebaseapp.com",
  projectId: "dashboard-contable-b96fc",
  storageBucket: "dashboard-contable-b96fc.firebasestorage.app",
  messagingSenderId: "496815444325",
  appId: "1:496815444325:web:b33f0a77becd9abc80118c"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

let CU=null, CC=null, BD=null, RD=null, hist=[], tab='balance', chatHist=[], acts=[], charts=[];

// ── AUTH ──────────────────────────────────────────────────────────────────
function E(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function showErr(m){const e=document.getElementById('loginErr');e.textContent=m;e.style.display='block';}
function clearErr(){document.getElementById('loginErr').style.display='none';}
window.showReg=()=>{document.getElementById('loginForm').style.display='none';document.getElementById('regForm').style.display='block';clearErr();};
window.showLogin=()=>{document.getElementById('regForm').style.display='none';document.getElementById('loginForm').style.display='block';clearErr();};

window.doLogin=async()=>{
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value;
  if(!email||!pass){showErr('Completa todos los campos.');return;}
  const btn=document.getElementById('lBtn');btn.textContent='Ingresando...';btn.disabled=true;
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){showErr(e.code==='auth/invalid-credential'?'Correo o contrasena incorrectos.':'Error: '+e.message);btn.textContent='Iniciar sesion';btn.disabled=false;}
};

window.doReg=async()=>{
  const nom=document.getElementById('rNom').value.trim();
  const email=document.getElementById('rEmail').value.trim();
  const pass=document.getElementById('rPass').value;
  if(!nom||!email||!pass){showErr('Completa todos los campos.');return;}
  if(pass.length<6){showErr('La contrasena debe tener al menos 6 caracteres.');return;}
  const btn=document.getElementById('rBtn');btn.textContent='Creando cuenta...';btn.disabled=true;
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await updateProfile(cred.user,{displayName:nom});
    await setDoc(doc(db,'usuarios',cred.user.uid),{nombre:nom,email,rol:'contador',creado:serverTimestamp()});
  }catch(e){showErr(e.code==='auth/email-already-in-use'?'Este correo ya esta registrado.':'Error: '+e.message);btn.textContent='Crear cuenta';btn.disabled=false;}
};

window.doLogout=async()=>{await signOut(auth);};

onAuthStateChanged(auth,user=>{
  if(user){
    CU=user;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('uLabel').textContent=user.displayName||user.email;
    cargarCartera();
  }else{
    CU=null;
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

// ── CARTERA ───────────────────────────────────────────────────────────────
async function cargarCartera(){
  document.getElementById('carteraView').style.display='block';
  document.getElementById('dashView').style.display='none';
  ['btnV','btnB','btnR','bb','br'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='none';});
  document.getElementById('expbar').style.display='none';
  CC=null;BD=null;RD=null;hist=[];
  const grid=document.getElementById('cgrid');
  grid.innerHTML='<div style="text-align:center;padding:40px;color:#aaa;grid-column:1/-1"><span class="spin"></span> Cargando...</div>';
  try{
    const q=query(collection(db,'clientes'),where('contadorId','==',CU.uid));
    const snap=await getDocs(q);
    let html='';
    snap.forEach(d=>{const c={id:d.id,...d.data()};html+=cCardHTML(c);});
    html+='<div class="add-c" onclick="abrirModal()">+ Agregar cliente</div>';
    grid.innerHTML=html;
  }catch(e){grid.innerHTML='<div style="color:#E24B4A;padding:20px">Error: '+e.message+'</div>';}
}
window.goCartera=cargarCartera;

function cCardHTML(c){
  return '<div class="ccrd" onclick="abrirCliente(\''+c.id+'\',\''+E(c.nombre)+'\',\''+E(c.rut||'')+'\')">'
    +'<div class="cn">'+E(c.nombre)+'</div>'
    +'<div class="cr">'+E(c.rut||'')+(c.giro?' · '+E(c.giro):'')+'</div>'
    +'<div class="cb"><span class="cbg">'+(c.periodos||0)+' periodo(s)</span>'
    +(c.ultimoPeriodo?'<span class="cbg g">'+E(c.ultimoPeriodo)+'</span>':'<span class="cbg">Sin datos</span>')
    +'</div></div>';
}

window.abrirModal=()=>{document.getElementById('mCliente').style.display='flex';document.getElementById('mcN').focus();};
window.cerrarModal=()=>{document.getElementById('mCliente').style.display='none';};
window.guardarCliente=async()=>{
  const nombre=document.getElementById('mcN').value.trim();
  const rut=document.getElementById('mcR').value.trim();
  const giro=document.getElementById('mcG').value.trim();
  const contacto=document.getElementById('mcC').value.trim();
  if(!nombre){alert('El nombre es obligatorio.');return;}
  try{
    await addDoc(collection(db,'clientes'),{nombre,rut,giro,contacto,contadorId:CU.uid,periodos:0,creado:serverTimestamp()});
    cerrarModal();
    document.getElementById('mcN').value='';document.getElementById('mcR').value='';
    document.getElementById('mcG').value='';document.getElementById('mcC').value='';
    cargarCartera();
  }catch(e){alert('Error: '+e.message);}
};

async function abrirCliente(id,nombre,rut){
  CC={id,nombre,rut};BD=null;RD=null;hist=[];tab='balance';
  document.getElementById('carteraView').style.display='none';
  document.getElementById('dashView').style.display='flex';
  ['btnV','btnB','btnR','bb','br'].forEach(id2=>{const el=document.getElementById(id2);if(el)el.style.display='inline-flex';});
  document.getElementById('bb').style.display='inline-block';
  document.getElementById('br').style.display='inline-block';
  setBadge('bb','Sin balance','');setBadge('br','Sin rem.','');
  await cargarPeriodos(id);
}
window.abrirCliente=abrirCliente;

async function cargarPeriodos(clienteId){
  try{
    const q=query(collection(db,'clientes',clienteId,'periodos'),orderBy('creado'));
    const snap=await getDocs(q);
    hist=[];
    snap.forEach(d=>hist.push({id:d.id,...d.data()}));
    if(hist.length>0){
      const u=hist[hist.length-1];
      BD=u.bal;RD=u.rem||null;calcTot(BD);
      setBadge('bb','✓ '+BD.per,'ok');
      if(RD)setBadge('br','✓ '+RD.per,'ok2');
      document.getElementById('expbar').style.display='flex';
      document.getElementById('sb').disabled=false;
    }
    render();
  }catch(e){console.error(e);render();}
}

async function guardarPeriodo(b,r){
  if(!CC)return;
  const ind=calcInd(b,r);
  const entry={lbl:b.per,emp:b.emp,bal:b,rem:r||null,ind,fecha:new Date().toLocaleDateString('es-CL'),creado:serverTimestamp()};
  try{
    const q=query(collection(db,'clientes',CC.id,'periodos'),where('lbl','==',b.per));
    const snap=await getDocs(q);
    let pid;
    if(!snap.empty){pid=snap.docs[0].id;await setDoc(doc(db,'clientes',CC.id,'periodos',pid),entry);}
    else{const ref=await addDoc(collection(db,'clientes',CC.id,'periodos'),entry);pid=ref.id;}
    const idx=hist.findIndex(h=>h.lbl===b.per);
    if(idx>=0)hist[idx]={id:pid,...entry};else hist.push({id:pid,...entry});
    hist.sort((a,b2)=>a.lbl.localeCompare(b2.lbl));
    await setDoc(doc(db,'clientes',CC.id),{periodos:hist.length,ultimoPeriodo:b.per},{merge:true});
  }catch(e){console.error('Error guardando:',e);}
}

function setBadge(id,t,c){const b=document.getElementById(id);if(b){b.textContent=t;b.className='badge '+(c||'');}}
function n(v){return parseFloat(String(v||0).replace(/[^\d.-]/g,''))||0;}
function M(x){if(Math.abs(x)>=1e9)return'$'+(x/1e9).toFixed(2)+'B';if(Math.abs(x)>=1e6)return'$'+Math.round(x/1e6)+'M';if(Math.abs(x)>=1e3)return'$'+Math.round(x/1e3)+'K';return'$'+Math.round(x);}
function P(x){return isNaN(x)||!isFinite(x)?'N/A':(x*100).toFixed(1)+'%';}
function calcTot(d){d.ac=d.ef+d.cxc+d.inv+d.oac;d.anc=d.ppe+d.int+d.ilp;d.pc=d.cxp+d.dcp+d.opc;d.pnc=d.dlp+d.opnc;d.pat=d.cap+d.ure+d.util;}
function calcInd(d,r){
  const ac=d.ac,anc=d.anc,pc=d.pc,pnc=d.pnc,pat=d.pat,tot=ac+anc;
  const ebit=d.ven-d.cos-d.gas,ebitda=ebit+(d.dep||0);
  const ts=r?r.ts:[],pl=ts.reduce((s,t)=>s+t.liq,0);
  const dCxC=d.cxc>0&&d.ven>0?365/(d.ven/d.cxc):0;
  const dCxP=d.cxp>0&&d.cos>0?365/(d.cos/d.cxp):0;
  const dInv=d.inv>0&&d.cos>0?365/(d.cos/d.inv):0;
  return{rc:pc>0?ac/pc:0,pa:pc>0?(ac-d.inv)/pc:0,end:tot>0?(pc+pnc)/tot:0,
    roe:pat>0?d.util/pat:0,roa:tot>0?d.util/tot:0,margen:d.ven>0?d.util/d.ven:0,
    ebit,ebitda,mEbitda:d.ven>0?ebitda/d.ven:0,
    dCxC,dCxP,dInv,ciclo:dCxC+dInv-dCxP,
    ven:d.ven,util:d.util,pl,trab:ts.length,
    vtrab:ts.length>0?d.ven/ts.length:0,
    ppl:d.ven>0&&pl>0?pl*12/d.ven:0};
}

async function processFile(file,tipo){
  const id=tipo==='b'?'bb':'br';setBadge(id,'Procesando...','loading');
  try{
    const ext=file.name.split('.').pop().toLowerCase();
    if(ext==='pdf'){await processPDF(file,tipo);}
    else{
      const rows=await readXL(file);
      if(tipo==='b'){BD=parse8col(rows);calcTot(BD);setBadge(id,'✓ '+BD.per,'ok');}
      else{RD=parseRem(rows);setBadge(id,'✓ '+RD.per+' ('+RD.ts.length+' trab.)','ok2');}
      if(BD){await guardarPeriodo(BD,RD);document.getElementById('expbar').style.display='flex';document.getElementById('sb').disabled=false;render();}
    }
  }catch(e){setBadge(id,'Error: '+e.message,'');console.error(e);}
}
function readXL(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>{try{const wb=XLSX.read(e.target.result,{type:'binary'});const ws=wb.Sheets[wb.SheetNames[0]];res(XLSX.utils.sheet_to_json(ws,{header:1,defval:''}));}catch(err){rej(err);}};r.onerror=()=>rej(new Error('Error'));r.readAsBinaryString(file);});}
function parse8col(rows){
  const d={emp:'Empresa',per:'',ef:0,cxc:0,inv:0,oac:0,ppe:0,int:0,ilp:0,cxp:0,dcp:0,opc:0,dlp:0,opnc:0,cap:0,ure:0,ven:0,cos:0,gas:0,util:0,dep:0,gfi:0};
  rows.forEach(row=>{const cu=String(row[0]||'').trim(),ac=n(row[5]),pa=n(row[6]),pe=n(row[7]),ga=n(row[8]);if(!cu||cu.length<4)return;const c=cu.toUpperCase();
    if(ac>0){if(/CAJA|BANCO|FONDO/.test(c))d.ef+=ac;else if(/DEUDOR|CLIENTE/.test(c))d.cxc+=ac;else if(/MATERIA|INVENTARIO/.test(c))d.inv+=ac;else if(/VEHICULO|MAQUINAR|EQUIP/.test(c)&&!/TRANSIT/.test(c))d.ppe+=ac;else if(/LEASING|INTANGIB/.test(c))d.int+=ac;else if(/DEPREC/.test(c))d.ppe-=ac;else d.oac+=ac;}
    if(pa>0){if(/PRESTAMO/.test(c))d.dcp+=pa;else if(/FACTURA.*PAG|CUENTAS.*PAG/.test(c))d.cxp+=pa;else if(/IMPOSICION|IVA DEB|IMPUESTO/.test(c))d.opc+=pa;else if(/IVA POST/.test(c))d.dlp+=pa;else if(/CAPITAL|REVALOR/.test(c))d.cap+=pa;else if(/RESULTADO ACUM/.test(c))d.ure+=pa;else d.opc+=pa;}
    if(ga>0&&/VENTA/.test(c)&&!/COSTO/.test(c))d.ven+=ga;if(pe>0&&/COSTO/.test(c))d.cos+=pe;if(pe>0&&/REMUN|HONOR|GASTO|ARRIENDO/.test(c))d.gas+=pe;if(pe>0&&/DEPREC/.test(c))d.dep+=pe;if(pe>0&&/INTERES|GASTO FINANC/.test(c))d.gfi+=pe;
  });return d;
}
function parseRem(rows){
  const rem={per:'',ts:[]};let hi=-1,cols={};
  for(let i=0;i<rows.length;i++){const row=rows[i].map(c=>String(c).toUpperCase());if(row.some(c=>/NOMBRE|TRABAJ/.test(c))){hi=i;row.forEach((c,j)=>{if(/NOMBRE|TRABAJ/.test(c))cols.nom=j;if(/CARGO/.test(c))cols.car=j;if(/AREA|DEPTO/.test(c))cols.area=j;if(/SUELDO.BASE|HABER.BASE/.test(c))cols.sb=j;if(/HORA.EXT/.test(c))cols.he=j;if(/BONO/.test(c))cols.bon=j;if(/AFP/.test(c))cols.afp=j;if(/SALUD|ISAPRE/.test(c))cols.sal=j;if(/IMPUESTO/.test(c))cols.imp=j;if(/LIQUIDO|NETO/.test(c))cols.liq=j;});break;}}
  if(hi<0)return rem;
  for(let i=hi+1;i<rows.length;i++){const row=rows[i];if(!row[cols.nom||0])continue;rem.ts.push({nom:String(row[cols.nom]||''),car:String(row[cols.car]||''),area:String(row[cols.area]||''),sb:n(row[cols.sb]),he:n(row[cols.he]),bon:n(row[cols.bon]),afp:n(row[cols.afp]),sal:n(row[cols.sal]),imp:n(row[cols.imp]),liq:n(row[cols.liq])});}
  return rem;
}
async function processPDF(file,tipo){
  const b64=await toB64(file);
  const prompt=tipo==='b'?'Extrae balance 8 columnas. SOLO JSON sin markdown: {"emp":"","per":"","ef":0,"cxc":0,"inv":0,"oac":0,"ppe":0,"int":0,"ilp":0,"cxp":0,"dcp":0,"opc":0,"dlp":0,"opnc":0,"cap":0,"ure":0,"ven":0,"cos":0,"gas":0,"util":0,"dep":0,"gfi":0}':'Extrae remuneraciones. SOLO JSON sin markdown: {"per":"","ts":[{"nom":"","car":"","area":"","sb":0,"he":0,"bon":0,"afp":0,"sal":0,"imp":0,"liq":0}]}';
  const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}},{type:'text',text:prompt}]}]})});
  const data=await res.json();const txt=data.content.map(i=>i.text||'').join('');
  const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
  if(tipo==='b'){BD=parsed;calcTot(BD);setBadge('bb','✓ PDF Balance','ok');}
  else{RD=parsed;setBadge('br','✓ PDF Rem.','ok2');}
  if(BD){await guardarPeriodo(BD,RD);document.getElementById('expbar').style.display='flex';document.getElementById('sb').disabled=false;render();}
}
function toB64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result.split(',')[1]);r.onerror=()=>rej(new Error('Error'));r.readAsDataURL(file);});}

function drawHM(){

  h+='<div style="display:grid;grid-template-columns:'+cols2+';gap:4px;margin-bottom:4px;align-items:center"><div></div>';

    h+='<div style="font-size:11px;color:#666;padding-left:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+mm.l+'</div>';
    hist.forEach((hh,hi)=>{const v=hh.ind[mm.k];const col=mm.g(v)?'#1D9E75':mm.m(v)?'#BA7517':'#E24B4A';const idx=reg('Explicame '+mm.l+' que muestra '+mm.fmt(v)+' en '+hh.lbl+' para '+E(CC?.nombre)+'. Es buen resultado?');h+='<div class="hmc" style="background:'+col+'" onclick="act('+idx+')">'+mm.fmt(v)+'</div>';});

}

// ── CHAT ──────────────────────────────────────────────────────────────────
function setSugs(items){const el=document.getElementById('sugs');el.innerHTML=items.map(s=>{const i=reg(s);return '<button class="sug" onclick="act('+i+')">💬 '+s+'</button>';}).join('');}
function addMsg(txt,tipo){const el=document.getElementById('msgs');const div=document.createElement('div');div.className='msg '+tipo;div.innerHTML=tipo==='ai'?txt.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>'):txt;el.appendChild(div);el.scrollTop=el.scrollHeight;return div;}
function aiCtx(){
  chatHist=[];if(!BD||!CC)return;
  const d=BD,r=RD,ts=r?r.ts:[],tL=ts.reduce((s,t)=>s+t.liq,0);
  const ebit=d.ven-d.cos-d.gas,ebitda=ebit+(d.dep||0);
  let msg='Cliente: **'+CC.nombre+'**\n';
  msg+='Ventas: **'+M(d.ven)+'** | Utilidad: **'+M(d.util)+'** | EBITDA: **'+M(ebitda)+'**';
  if(ts.length>0)msg+='\nPlanilla: **'+M(tL)+'**/mes ('+ts.length+' trab.)';
  if(hist.length>1)msg+='\nHistorial: **'+hist.length+' periodos** disponibles.';
  msg+='\n\nHaz clic en cualquier tarjeta para explicaciones.';
  chatHist.push({role:'assistant',content:msg});addMsg(msg,'ai');
  setSugs(['Como esta la liquidez de '+CC.nombre,'El endeudamiento es preocupante?','Que recomiendas para mejorar el EBITDA?']);
}
function sysCtx(){
  const d=BD,r=RD,ts=r?r.ts:[];
  const ebit=d?d.ven-d.cos-d.gas:0,ebitda=ebit+(d?d.dep||0:0),tL=ts.reduce((s,t)=>s+t.liq,0);
  let ctx='Eres analista financiero experto. Estas analizando EXCLUSIVAMENTE al cliente '+E(CC?.nombre||'')+'. NO mezcles datos con otros clientes. Responde en espanol, maximo 5 oraciones, usa **negrita** para numeros clave.';
  if(d)ctx+='\nCLIENTE: '+CC?.nombre+' | PERIODO: '+d.per+' | Ventas '+M(d.ven)+', Utilidad '+M(d.util)+', EBIT '+M(ebit)+', EBITDA '+M(ebitda)+', RC '+(d.pc>0?(d.ac/d.pc).toFixed(2):0)+'x, Endeudam. '+P((d.pc+d.pnc)/(d.ac+d.anc))+', ROE '+P(d.pat>0?d.util/d.pat:0)+', Margen '+P(d.ven>0?d.util/d.ven:0);
  if(ts.length>0)ctx+='\nREMUNERACIONES: '+ts.length+' trab., planilla liq. '+M(tL);
  if(hist.length>1)ctx+='\nHISTORIAL: '+hist.length+' periodos ('+hist.map(h=>h.lbl).join(', ')+').';
  return ctx;
}
function sendMsg(txt){if(!txt)return;addMsg(txt,'user');chatHist.push({role:'user',content:txt});callAI();}
window.send=()=>{const inp=document.getElementById('ci');const txt=inp.value.trim();if(!txt)return;inp.value='';sendMsg(txt);};
async function callAI(){
  document.getElementById('sb').disabled=true;
  const el=document.getElementById('msgs');
  const typ=document.createElement('div');typ.className='msg ai';typ.innerHTML='<div class="typing"><span></span><span></span><span></span></div>';
  el.appendChild(typ);el.scrollTop=el.scrollHeight;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sysCtx(),messages:chatHist})});
    const data=await res.json();
    const resp=data.content.map(i=>i.text||'').join('');
    typ.remove();addMsg(resp,'ai');chatHist.push({role:'assistant',content:resp});
  }catch(e){typ.remove();addMsg('Error al consultar la IA.','ai');}
  document.getElementById('sb').disabled=false;
}
